services:
  db:
    image: postgres:16-alpine
    container_name: cyber_summit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cyber_summit}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cyber_summit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber_summit_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cyber_summit_api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cyber_summit}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cyber_summit_network

  frontend:
    build:
      context: ../registration-checkin-front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        # Add more VITE_* variables here as needed:
        # - VITE_SOME_OTHER_VAR=${VITE_SOME_OTHER_VAR}
    container_name: cyber_summit_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - cyber_summit_network

networks:
  cyber_summit_network:
    driver: bridge

volumes:
  postgres_data: